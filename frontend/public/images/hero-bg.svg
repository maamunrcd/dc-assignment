<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001a11"/>
      <stop offset="50%" stop-color="#002818"/>
      <stop offset="100%" stop-color="#001510"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00ff41" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <!-- silhouettes -->
  <ellipse cx="500" cy="620" rx="280" ry="120" fill="#001a11" opacity="0.6"/>
  <ellipse cx="900" cy="640" rx="320" ry="130" fill="#001a11" opacity="0.5"/>
  <ellipse cx="1150" cy="610" rx="240" ry="110" fill="#001a11" opacity="0.55"/>
  <!-- heads -->
  <circle cx="420" cy="480" r="45" fill="#0a3020" opacity="0.8"/>
  <circle cx="580" cy="460" r="50" fill="#0a3020" opacity="0.75"/>
  <circle cx="750" cy="470" r="48" fill="#0a3020" opacity="0.8"/>
  <circle cx="920" cy="450" r="52" fill="#0a3020" opacity="0.7"/>
  <circle cx="1080" cy="465" r="46" fill="#0a3020" opacity="0.75"/>
  <circle cx="1220" cy="455" r="44" fill="#0a3020" opacity="0.8"/>
  <!-- network lines -->
  <g stroke="#00ff41" stroke-opacity="0.3" stroke-width="1" fill="none">
    <line x1="420" y1="480" x2="580" y2="460"/>
    <line x1="580" y1="460" x2="750" y2="470"/>
    <line x1="750" y1="470" x2="920" y2="450"/>
    <line x1="920" y1="450" x2="1080" y2="465"/>
    <line x1="1080" y1="465" x2="1220" y2="455"/>
    <line x1="420" y1="480" x2="750" y2="470"/>
    <line x1="580" y1="460" x2="1080" y2="465"/>
    <line x1="750" y1="470" x2="1220" y2="455"/>
  </g>
  <!-- network nodes -->
  <g fill="#00ff41">
    <circle cx="420" cy="480" r="5" opacity="0.9"/>
    <circle cx="580" cy="460" r="5" opacity="0.8"/>
    <circle cx="750" cy="470" r="6" opacity="0.9"/>
    <circle cx="920" cy="450" r="5" opacity="0.85"/>
    <circle cx="1080" cy="465" r="5" opacity="0.8"/>
    <circle cx="1220" cy="455" r="5" opacity="0.9"/>
    <circle cx="500" cy="400" r="3" opacity="0.5"/>
    <circle cx="680" cy="380" r="3" opacity="0.4"/>
    <circle cx="1000" cy="390" r="3" opacity="0.45"/>
    <circle cx="850" cy="350" r="2" opacity="0.35"/>
  </g>
  <!-- bokeh -->
  <g filter="url(#blur)" opacity="0.4">
    <circle cx="200" cy="200" r="80" fill="#00ff41" opacity="0.08"/>
    <circle cx="1400" cy="300" r="100" fill="#00ff41" opacity="0.06"/>
    <circle cx="300" cy="700" r="60" fill="#00ff41" opacity="0.05"/>
  </g>
</svg>
