<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700">
  <defs>
    <linearGradient id="tablet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001a11"/>
      <stop offset="100%" stop-color="#002818"/>
    </linearGradient>
  </defs>
  <!-- stand -->
  <rect x="380" y="580" width="140" height="12" rx="6" fill="#333"/>
  <path d="M420 580 L450 540 L500 540 L530 580 Z" fill="#2a2a2a"/>
  <!-- tablet body -->
  <rect x="180" y="80" width="540" height="460" rx="28" fill="url(#tablet)" stroke="#444" stroke-width="2"/>
  <!-- screen -->
  <rect x="200" y="100" width="500" height="400" rx="16" fill="url(#screen)"/>
  <!-- UI elements -->
  <rect x="230" y="130" width="180" height="14" rx="7" fill="#00ff41" opacity="0.9"/>
  <rect x="230" y="165" width="280" height="8" rx="4" fill="#ffffff" opacity="0.2"/>
  <rect x="230" y="185" width="240" height="8" rx="4" fill="#ffffff" opacity="0.15"/>
  <!-- chart area -->
  <rect x="230" y="220" width="440" height="200" rx="12" fill="#001510" stroke="#00ff41" stroke-opacity="0.2" stroke-width="1"/>
  <polyline points="260,380 320,320 400,340 480,260 560,280 640,200 700,220" fill="none" stroke="#00ff41" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="640" cy="200" r="6" fill="#00ff41"/>
  <!-- sidebar cards -->
  <rect x="230" y="440" width="130" height="40" rx="8" fill="#ffffff" opacity="0.08"/>
  <rect x="380" y="440" width="130" height="40" rx="8" fill="#ffffff" opacity="0.08"/>
  <rect x="530" y="440" width="130" height="40" rx="8" fill="#00ff41" opacity="0.15"/>
  <!-- keyboard hint -->
  <rect x="250" y="555" width="400" height="20" rx="10" fill="#222" stroke="#333" stroke-width="1"/>
</svg>
